{% set name = "napari-organoid-counter" %}
{% set version = "0.2.9" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/napari-organoid-counter-{{ version }}.tar.gz
  sha256: e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - pip
    - python >=3.11,<3.12
    - setuptools-scm
  run:
    - python >=3.9
    - numpy >=1.26,<2
    - napari >=0.7
    - pytorch
    - torchvision
    - opencv
    - lxml
    - onnxruntime
    - bioio
    - bioio-ome-tiff
    - bioio-tifffile
    - bioio-imageio
    - bioio-czi
    - bioio-nd2
    - bioio-lif
    - bioio-dv
    - qtpy

test:
  imports:
    - napari_organoid_counter
  commands:
    - pip list
    # - pip check  # Fails due to aicsimageio deps and fixed constraints that were relaxed
  requires:
    - pip
    - pyqt

about:
  home: https://pypi.org/project/napari-organoid-counter
  summary: A plugin to automatically count lung organoids
  license: MIT
  license_file: LICENSE
  dev_url: https://github.com/HelmholtzAI-Consultants-Munich/napari-organoid-counter

extra:
  recipe-maintainers:
    - christinab12
    - goanpeca
    - jaimergp
