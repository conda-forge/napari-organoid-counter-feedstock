{% set name = "napari-organoid-counter" %}
{% set version = "0.2.13" %}
{% set python_min = "3.11" %}
{% set python_max = "3.14" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/napari_organoid_counter-{{ version }}.tar.gz
  sha256: 121bccd14e51912bd5e48b741926639c3e7dee064b97bedd6008edb605c37877

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 2

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
  run:
    - python >={{ python_min }} ,<{{ python_max }}
    - numpy ==2.2.6
    - pyqt
    - napari >=0.7.0
    - bioio ==3.3.0
    - pytorch
    - torchvision
    - bioio-ome-tiff ==1.4.0
    - bioio-tifffile ==1.3.0
    - bioio-lif ==1.4.0
    - opencv ==4.12.0
    - onnxruntime ==1.22.2
    - qtpy

test:
  imports:
    - napari_organoid_counter
  commands:
    - pip list
    # - pip check  # Fails due to aicsimageio deps and fixed constraints that were relaxed
  requires:
    - python {{ python_min }}
    - pip
    - pyqt

about:
  home: https://pypi.org/project/napari-organoid-counter
  summary: A plugin to automatically count lung organoids
  license: MIT
  license_file: LICENSE
  dev_url: https://github.com/HelmholtzAI-Consultants-Munich/napari-organoid-counter

extra:
  recipe-maintainers:
    - francesco-campi
    - christinab12
    - jaimergp
